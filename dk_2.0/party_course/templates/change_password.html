{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<h1 class="h4 mb-3">修改密码</h1>
<form method="post" class="card border-0 shadow-sm" style="max-width: 560px;">
  <div class="card-body row g-3">
    <div class="col-12">
      <label class="form-label">旧密码</label>
      <input type="password" class="form-control" name="old_password" required minlength="6">
    </div>
    <div class="col-12">
      <label class="form-label">新密码</label>
      <input type="password" class="form-control" name="new_password" required minlength="6">
    </div>
    <div class="col-12">
      <label class="form-label">确认新密码</label>
      <input type="password" class="form-control" name="confirm_password" required minlength="6">
    </div>
  </div>
  <div class="card-footer bg-white d-flex gap-2">
    <button class="btn btn-primary">保存</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('auth_bp.dashboard') }}">返回首页</a>
  </div>
</form>
{% endblock %}
