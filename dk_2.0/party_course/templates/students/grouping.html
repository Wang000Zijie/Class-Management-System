{% extends "base.html" %}

{% block title %}分组管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">分组管理</h1>
  <form method="post" class="d-flex gap-2 align-items-center">
    <input type="hidden" name="action" value="auto">
    <input class="form-control" style="width:120px" name="group_count" type="number" min="1" value="4">
    <button class="btn btn-outline-primary">自动分组</button>
  </form>
</div>

<form method="post" class="card border-0 shadow-sm">
  <div class="card-body table-responsive">
    <table class="table align-middle">
      <thead><tr><th>姓名</th><th>学号</th><th>组号</th><th>小组长</th></tr></thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s.name }}</td>
          <td>{{ s.student_id }}</td>
          <td><input class="form-control" style="width:100px" type="number" min="1" name="group_{{ s.id }}" value="{{ s.group_number or '' }}"></td>
          <td><input type="checkbox" name="leader_{{ s.id }}" {% if s.is_group_leader %}checked{% endif %}></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="card-footer bg-white">
    <button class="btn btn-primary">保存分组</button>
  </div>
</form>
{% endblock %}
